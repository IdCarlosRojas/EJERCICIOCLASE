<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio de Clase</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #24292e;
            margin-bottom: 10px;
        }
        p {
            color: #586069;
            font-size: 16px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            color: white;
            background-color: #2ea44f;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Hola, Mundo! 🚀</h1>
        <p>Este es el archivo de prueba para el repositorio <strong>EJERCICIOCLASE</strong> conectado con éxito.</p>
        <a href="https://github.com" target="_blank" class="btn">Ir a GitHub</a>
    </div>

</body>
</html>
